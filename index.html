<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaloriya Scanner AI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: #fff;
      min-height: 100vh;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero {
      text-align: center;
      margin-bottom: 24px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: 36px;
    }
    .hero p {
      margin: 0;
      color: #cbd5e1;
    }
    .card {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .tab {
      border: none;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      background: #334155;
      color: #fff;
      font-weight: 600;
    }
    .tab.active {
      background: #22c55e;
    }
    .camera-box, .upload-box {
      display: grid;
      gap: 16px;
    }
    video, img.preview {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      border-radius: 16px;
      background: #000;
    }
    input[type="file"] {
      display: none;
    }
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      padding: 14px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s;
    }
    .btn-primary {
      background: #22c55e;
      color: #fff;
    }
    .btn-secondary {
      background: #3b82f6;
      color: #fff;
    }
    .btn-dark {
      background: #475569;
      color: #fff;
    }
    .btn:hover { transform: translateY(-1px); }
    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .metric {
      background: #1e293b;
      border-radius: 14px;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.15);
    }
    .metric span {
      display: block;
      color: #94a3b8;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .metric strong {
      font-size: 20px;
    }
    .history ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .history li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.15);
      color: #e2e8f0;
    }
    .muted { color: #94a3b8; }
    .status {
      margin-top: 10px;
      color: #cbd5e1;
      font-size: 14px;
    }
    .scanner-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 8px;
      box-shadow: 0 0 10px #22c55e;
    }
    @media (max-width: 640px) {
      .hero h1 { font-size: 28px; }
      .btn { width: 100%; }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Kaloriya Scanner AI</h1>
      <p>Ovqatni suratga oling yoki yuklang, kaloriya taxmini darhol chiqadi.</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" id="cameraTab">Kamera</button>
        <button class="tab" id="uploadTab">Upload</button>
      </div>

      <div id="cameraSection" class="camera-box">
        <video id="video" autoplay playsinline></video>
        <div class="btn-row">
          <button class="btn btn-primary" id="startCameraBtn">Kamerani yoqish</button>
          <button class="btn btn-secondary" id="captureBtn">Scan qilish</button>
          <button class="btn btn-dark" id="stopCameraBtn">Kamerani o‘chirish</button>
        </div>
        <div class="status" id="cameraStatus">Holat: kamera o‘chiq.</div>
      </div>

      <div id="uploadSection" class="upload-box" style="display:none;">
        <input type="file" id="fileInput" accept="image/*" capture="environment" />
        <img id="preview" class="preview" style="display:none;" />
        <div class="btn-row">
          <button class="btn btn-primary" id="chooseFileBtn">Rasm tanlash</button>
          <button class="btn btn-secondary" id="scanUploadBtn">Scan qilish</button>
        </div>
        <div class="status" id="uploadStatus">Holat: rasm tanlanmagan.</div>
      </div>
    </div>

    <div class="card" id="resultCard" style="display:none;">
      <h2>Natija</h2>
      <p id="resultText" class="muted"></p>
      <div class="result-grid">
        <div class="metric"><span>Ovqat</span><strong id="foodName">-</strong></div>
        <div class="metric"><span>Kaloriya</span><strong id="calories">-</strong></div>
        <div class="metric"><span>Protein</span><strong id="protein">-</strong></div>
        <div class="metric"><span>Yog'</span><strong id="fat">-</strong></div>
        <div class="metric"><span>Uglevod</span><strong id="carbs">-</strong></div>
        <div class="metric"><span>Ishonch</span><strong id="confidence">-</strong></div>
      </div>
    </div>

    <div class="card history">
      <h2>Tarix</h2>
      <ul id="historyList">
        <li><span class="muted">Hali scan qilinmagan.</span></li>
      </ul>
    </div>
  </div>

  <script>
    const cameraTab = document.getElementById('cameraTab');
    const uploadTab = document.getElementById('uploadTab');
    const cameraSection = document.getElementById('cameraSection');
    const uploadSection = document.getElementById('uploadSection');

    const video = document.getElementById('video');
    const startCameraBtn = document.getElementById('startCameraBtn');
    const stopCameraBtn = document.getElementById('stopCameraBtn');
    const captureBtn = document.getElementById('captureBtn');
    const cameraStatus = document.getElementById('cameraStatus');

    const fileInput = document.getElementById('fileInput');
    const chooseFileBtn = document.getElementById('chooseFileBtn');
    const preview = document.getElementById('preview');
    const uploadStatus = document.getElementById('uploadStatus');
    const scanUploadBtn = document.getElementById('scanUploadBtn');

    const resultCard = document.getElementById('resultCard');
    const resultText = document.getElementById('resultText');
    const foodName = document.getElementById('foodName');
    const calories = document.getElementById('calories');
    const protein = document.getElementById('protein');
    const fat = document.getElementById('fat');
    const carbs = document.getElementById('carbs');
    const confidence = document.getElementById('confidence');
    const historyList = document.getElementById('historyList');

    let stream = null;
    let lastImage = null;

    const nutritionDB = {
      pizza: { calories: 285, protein: 12, fat: 10, carbs: 36 },
      burger: { calories: 354, protein: 17, fat: 14, carbs: 33 },
      salad: { calories: 120, protein: 3, fat: 7, carbs: 10 },
      rice: { calories: 206, protein: 4, fat: 0.4, carbs: 45 },
      chicken: { calories: 239, protein: 27, fat: 14, carbs: 0 },
      soup: { calories: 90, protein: 4, fat: 2, carbs: 12 },
      apple: { calories: 95, protein: 0.5, fat: 0.3, carbs: 25 },
      banana: { calories: 105, protein: 1.3, fat: 0.4, carbs: 27 }
    };

    function setTab(mode) {
      const cameraMode = mode === 'camera';
      cameraTab.classList.toggle('active', cameraMode);
      uploadTab.classList.toggle('active', !cameraMode);
      cameraSection.style.display = cameraMode ? 'grid' : 'none';
      uploadSection.style.display = cameraMode ? 'none' : 'grid';
    }

    cameraTab.onclick = () => setTab('camera');
    uploadTab.onclick = () => setTab('upload');

    chooseFileBtn.onclick = () => fileInput.click();

    startCameraBtn.onclick = async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false
        });
        video.srcObject = stream;
        cameraStatus.innerHTML = '<span class="scanner-dot"></span>Kamera yoqildi. Ovqatni markazga qo'ying.';
      } catch (err) {
        cameraStatus.textContent = 'Kamera ochilmadi: ' + err.message;
      }
    };

    stopCameraBtn.onclick = () => {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
        video.srcObject = null;
        cameraStatus.textContent = 'Holat: kamera o‘chiq.';
      }
    };

    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      lastImage = file;
      const url = URL.createObjectURL(file);
      preview.src = url;
      preview.style.display = 'block';
      uploadStatus.textContent = 'Rasm tanlandi: ' + file.name;
    };

    function mockScan() {
      const foods = Object.keys(nutritionDB);
      const food = foods[Math.floor(Math.random() * foods.length)];
      const n = nutritionDB[food];
      const conf = Math.floor(80 + Math.random() * 20);
      return { food, ...n, conf };
    }

    function showResult(data) {
      resultCard.style.display = 'block';
      foodName.textContent = data.food;
      calories.textContent = data.calories + ' kcal';
      protein.textContent = data.protein + ' g';
      fat.textContent = data.fat + ' g';
      carbs.textContent = data.carbs + ' g';
      confidence.textContent = data.conf + '%';
      resultText.textContent = `AI taxmini bo‘yicha "${data.food}" aniqlanadi.`;

      const li = document.createElement('li');
      li.innerHTML = `<span>${data.food}</span><span>${data.calories} kcal — ${data.conf}%</span>`;
      if (historyList.children.length === 1 && historyList.children[0].textContent.includes('Hali scan')) {
        historyList.innerHTML = '';
      }
      historyList.prepend(li);
    }

    captureBtn.onclick = () => {
      if (!stream) {
        cameraStatus.textContent = 'Avval kamerani yoqing.';
        return;
      }
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      lastImage = canvas.toDataURL('image/jpeg', 0.92);
      showResult(mockScan());
    };

    scanUploadBtn.onclick = () => {
      if (!lastImage) {
        uploadStatus.textContent = 'Avval rasm tanlang.';
        return;
      }
      showResult(mockScan());
    };
  </script>
</body>
</html>
